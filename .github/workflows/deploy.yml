name: 自動部署網站到 GitHub Pages

on:
  push:
    branches:
      - master # 🌟 如果你的分支叫 main，請改為 main
      - WillyChang

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 抓取原始碼
        uses: actions/checkout@v4

      - name: 2. 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 3. 安裝套件
        run: npm install

      - name: 4. 執行打包 (Build)
        run: npm run build

      - name: 5. 設定 Pages
        uses: actions/configure-pages@v4

      - name: 6. 上傳打包後的檔案 (dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist" # 🌟 確保你的 Vite 打包目錄是 dist

      - name: 7. 正式發布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
